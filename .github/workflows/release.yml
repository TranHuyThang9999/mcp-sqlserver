name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build release packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build binaries
        run: |
          mkdir -p dist/windows-amd64 dist/linux-amd64 dist/darwin-arm64 dist/darwin-amd64
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/windows-amd64/mcp-sqlserver.exe ./cmd
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/linux-amd64/mcp-sqlserver ./cmd
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/darwin-arm64/mcp-sqlserver ./cmd
          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/darwin-amd64/mcp-sqlserver ./cmd

      - name: Assemble packages
        run: |
          mkdir -p package/mcp-sqlserver-windows-amd64 package/mcp-sqlserver-linux-amd64 package/mcp-sqlserver-darwin-arm64 package/mcp-sqlserver-darwin-amd64

          cp dist/windows-amd64/mcp-sqlserver.exe package/mcp-sqlserver-windows-amd64/
          cp scripts/install.ps1 README.md .env.example package/mcp-sqlserver-windows-amd64/

          cp dist/linux-amd64/mcp-sqlserver package/mcp-sqlserver-linux-amd64/
          cp scripts/install.ps1 scripts/install.sh README.md .env.example package/mcp-sqlserver-linux-amd64/
          chmod +x package/mcp-sqlserver-linux-amd64/mcp-sqlserver package/mcp-sqlserver-linux-amd64/install.sh

          cp dist/darwin-arm64/mcp-sqlserver package/mcp-sqlserver-darwin-arm64/
          cp scripts/install.ps1 scripts/install.sh README.md .env.example package/mcp-sqlserver-darwin-arm64/
          chmod +x package/mcp-sqlserver-darwin-arm64/mcp-sqlserver package/mcp-sqlserver-darwin-arm64/install.sh

          cp dist/darwin-amd64/mcp-sqlserver package/mcp-sqlserver-darwin-amd64/
          cp scripts/install.ps1 scripts/install.sh README.md .env.example package/mcp-sqlserver-darwin-amd64/
          chmod +x package/mcp-sqlserver-darwin-amd64/mcp-sqlserver package/mcp-sqlserver-darwin-amd64/install.sh

      - name: Archive packages
        run: |
          cd package
          zip -r ../mcp-sqlserver-windows-amd64.zip mcp-sqlserver-windows-amd64
          tar -czf ../mcp-sqlserver-linux-amd64.tar.gz mcp-sqlserver-linux-amd64
          tar -czf ../mcp-sqlserver-darwin-arm64.tar.gz mcp-sqlserver-darwin-arm64
          tar -czf ../mcp-sqlserver-darwin-amd64.tar.gz mcp-sqlserver-darwin-amd64
          cd ..
          sha256sum mcp-sqlserver-*.zip mcp-sqlserver-*.tar.gz > checksums.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mcp-sqlserver-packages
          path: |
            mcp-sqlserver-windows-amd64.zip
            mcp-sqlserver-linux-amd64.tar.gz
            mcp-sqlserver-darwin-arm64.tar.gz
            mcp-sqlserver-darwin-amd64.tar.gz
            checksums.txt

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mcp-sqlserver-windows-amd64.zip
            mcp-sqlserver-linux-amd64.tar.gz
            mcp-sqlserver-darwin-arm64.tar.gz
            mcp-sqlserver-darwin-amd64.tar.gz
            checksums.txt
